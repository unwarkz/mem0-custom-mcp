services:
  mem0-custom-mcp:
    image: ghcr.io/unwarkz/mem0-custom-mcp:latest
    env_file:
      - .env
    environment:
      - MEM0_API_URL=${MEM0_API_URL:-http://host.docker.internal:8888}
      - DEFAULT_USER_ID=${DEFAULT_USER_ID:-default}
      - MCP_PORT=${MCP_PORT:-3000}
    ports:
      - "${MCP_PORT:-3000}:${MCP_PORT:-3000}"
    restart: unless-stopped
